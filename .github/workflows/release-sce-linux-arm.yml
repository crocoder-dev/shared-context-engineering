name: Release sce CLI (Linux ARM)

on:
  workflow_call:
    inputs:
      release_ref:
        required: true
        type: string
      release_version:
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-linux-arm-artifacts:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.release_ref }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Build canonical Linux ARM CLI release artifacts
        run: |
          nix run .#release-artifacts -- \
            --version "${{ inputs.release_version }}" \
            --out-dir dist

      - name: Upload Linux ARM CLI release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sce-release-aarch64-unknown-linux-gnu
          path: dist/
          if-no-files-found: error
