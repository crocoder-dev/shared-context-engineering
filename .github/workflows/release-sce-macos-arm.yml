name: Release sce CLI (macOS ARM)

on:
  workflow_call:
    inputs:
      release_ref:
        required: true
        type: string
      release_version:
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-macos-arm-artifacts:
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_ref }}

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3.17.3

      - name: Build canonical macOS ARM CLI release artifacts
        run: |
          nix run .#release-artifacts -- \
            --version "${{ inputs.release_version }}" \
            --out-dir dist

      - name: Upload macOS ARM CLI release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sce-release-aarch64-apple-darwin
          path: dist/
          if-no-files-found: error
