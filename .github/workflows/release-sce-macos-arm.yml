name: Release sce CLI (macOS ARM)

on:
  workflow_call:
    inputs:
      release_ref:
        required: true
        type: string
      release_version:
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-macos-arm-artifacts:
    runs-on: macos-14
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.release_ref }}

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@629b284231c2a82554b724e357e47fc6020833c8 # v3.21.2

      - name: Build canonical macOS ARM CLI release artifacts
        run: |
          nix run .#release-artifacts -- \
            --version "${{ inputs.release_version }}" \
            --out-dir dist

      - name: Upload macOS ARM CLI release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sce-release-aarch64-apple-darwin
          path: dist/
          if-no-files-found: error
