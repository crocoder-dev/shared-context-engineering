name: Release sce CLI (macOS Intel)

on:
  workflow_call:
    inputs:
      release_version:
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-macos-intel-artifacts:
    runs-on: macos-15-intel
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v19

      - name: Build canonical macOS Intel CLI release artifacts
        run: |
          nix run .#release-artifacts -- \
            --version "${{ inputs.release_version }}" \
            --out-dir dist

      - name: Upload macOS Intel CLI release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sce-release-x86_64-apple-darwin
          path: dist/
          if-no-files-found: error
